name: Bug Report
description: Something isn't working correctly after installing a fix
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — the more information you provide, the faster we can help.

  - type: dropdown
    id: laptop_model
    attributes:
      label: Laptop Model
      description: Select your Samsung Galaxy Book model
      options:
        - Galaxy Book 5 Pro 14" (940XHA)
        - Galaxy Book 5 Pro 16" (960XHA)
        - Galaxy Book 5 Pro 360 (960QHA)
        - Galaxy Book 5 15" (750XHD)
        - Galaxy Book 5 15" (754XHD)
        - Galaxy Book 5 360 15" (750QHA / 754QHA)
        - Galaxy Book 4 Pro 14" (940XGK / 944XGK)
        - Galaxy Book 4 Pro 16" (960XGK / 964XGK)
        - Galaxy Book 4 Pro 360 (960QGK)
        - Galaxy Book 4 360 14" (940QGK)
        - Galaxy Book 4 360 15" (750QGK)
        - Galaxy Book 4 Ultra (960XMB / 960XMA / 960XGL)
        - Galaxy Book 3 Pro 14" (940XFG / 950XFG)
        - Galaxy Book 3 Pro 16" (960XFG / 965XFG)
        - Galaxy Book 3 Pro 360 14" (960QFG / 965QFG)
        - Galaxy Book 3 Ultra (960XFH)
        - Galaxy Book 3 360 (930XED / 950XED / 960XED / 930QED / 950QED)
        - Galaxy Book 3 (930MBE / 950XDB)
        - Other (specify in additional info)
    validations:
      required: true

  - type: input
    id: model_number
    attributes:
      label: DMI Product Name
      description: Run `cat /sys/class/dmi/id/product_name` and paste the result
      placeholder: e.g. 960QGK
    validations:
      required: true

  - type: dropdown
    id: fix
    attributes:
      label: Which fix is affected?
      options:
        - Webcam Fix (webcam-fix-book5 / webcam-fix-libcamera)
        - Webcam Toggle (F11 key)
        - Fan Speed Fix
        - Speaker Fix
        - Mic Fix
        - Fingerprint Fix
        - Function Key Fix
        - KDE Power Profile OSD
        - OV02C10 Clock Fix
        - Camera Relay
        - Other / Multiple
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux Distribution
      description: Include the full version
      placeholder: e.g. Fedora 43, Ubuntu 24.04.2 LTS, Arch Linux (2026-03-01)
    validations:
      required: true

  - type: input
    id: kernel
    attributes:
      label: Kernel Version
      description: Run `uname -r` and paste the result
      placeholder: e.g. 6.19.9-200.fc43.x86_64
    validations:
      required: true

  - type: dropdown
    id: secure_boot
    attributes:
      label: Secure Boot
      options:
        - Disabled
        - Enabled
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: desktop
    attributes:
      label: Desktop Environment
      options:
        - KDE Plasma
        - GNOME
        - Cinnamon
        - Mate
        - Xfce
        - Other
        - None (terminal only)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly
      placeholder: e.g. After installing the speaker fix, audio no longer works at all...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. Speakers should work after installing the fix
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How did you install the fix?
      options:
        - GUI app (samsung-galaxybook-gui.py)
        - Bash script (install.sh / samsung-galaxybook-setup.sh)
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        If installed via GUI app:
        1. Opened the GUI app
        2. Clicked Install on <fix name>
        3. Rebooted
        4. <what happened>

        If installed via bash script:
        1. Ran sudo bash install.sh (or samsung-galaxybook-setup.sh)
        2. Rebooted
        3. <what happened>
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Please include output from any relevant commands. Useful commands:
        - `journalctl -b --no-pager | grep -i "error\|warn\|camera\|speaker\|fingerprint"`
        - `dmesg | grep -i "error\|warn\|camera\|speaker\|ipu\|ov02"`
        - `systemctl status <service-name>`
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: Anything else that might be relevant — e.g. dual boot setup, non-standard install path, previous fix versions installed
    validations:
      required: false
